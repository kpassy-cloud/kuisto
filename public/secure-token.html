<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuration GitHub - Kuisto</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #2d5a3d 0%, #1a3a25 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #2d5a3d;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: monospace;
            letter-spacing: 2px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #2d5a3d;
        }
        input::placeholder {
            letter-spacing: 0;
            font-family: sans-serif;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #2d5a3d, #3d7a4d);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(45, 90, 61, 0.3);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        .status.success {
            display: block;
            background: #d4edda;
            color: #155724;
        }
        .status.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
        }
        .info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #666;
        }
        .info code {
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Configuration GitHub</h1>
        <p class="subtitle">Connexion sécurisée pour synchroniser Kuisto</p>
        
        <div class="info">
            <strong>Comment obtenir un token :</strong><br>
            1. Allez sur <code>github.com/settings/tokens</code><br>
            2. Cliquez "Generate new token (classic)"<br>
            3. Sélectionnez "repo" permissions<br>
            4. Copiez le token généré
        </div>
        
        <form id="tokenForm">
            <div class="form-group">
                <label for="token">GitHub Personal Access Token</label>
                <input 
                    type="password" 
                    id="token" 
                    name="token" 
                    placeholder="github_pat_xxxxxxxxxxxxxxxxxxxx"
                    autocomplete="off"
                    required
                >
            </div>
            <button type="submit" id="submitBtn">
                🔒 Sécuriser et connecter
            </button>
        </form>
        
        <div id="status" class="status"></div>
    </div>

    <script>
        document.getElementById('tokenForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const token = document.getElementById('token').value;
            const submitBtn = document.getElementById('submitBtn');
            const status = document.getElementById('status');
            
            if (!token.startsWith('github_pat_')) {
                status.className = 'status error';
                status.textContent = 'Le token doit commencer par github_pat_';
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Connexion...';
            
            try {
                const response = await fetch('/api/secure-token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    status.className = 'status success';
                    status.textContent = '✅ Token sécurisé ! Vous pouvez fermer cette page.';
                    document.getElementById('token').value = '';
                    
                    // Notify parent if in iframe
                    if (window.parent !== window) {
                        window.parent.postMessage({ type: 'TOKEN_SET' }, '*');
                    }
                } else {
                    status.className = 'status error';
                    status.textContent = data.error || 'Erreur lors de la sauvegarde';
                }
            } catch (err) {
                status.className = 'status error';
                status.textContent = 'Erreur de connexion';
            }
            
            submitBtn.disabled = false;
            submitBtn.textContent = '🔒 Sécuriser et connecter';
        });
    </script>
</body>
</html>
